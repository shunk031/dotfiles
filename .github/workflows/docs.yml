name: Docs

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - ".github/workflows/docs.yml"
      - "Makefile"
      - "README.md"
      - "mkdocs.yml"
      - "scripts/**"
      - "install/**"
      - "home/.chezmoiscripts/**"
      - "home/dot_config/claude/hooks/**"
      - "home/dot_config/alias/**"
      - "home/dot_local/bin/**"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: false
          cache: true

      - name: Trust mise config
        run: mise trust --yes

      - name: Install shdoc plugin
        run: |
          if ! mise plugins ls | grep -qx shdoc; then
            mise plugins install shdoc https://github.com/shunk031/mise-shdoc.git
          fi

      - name: Install mise tools
        run: mise install

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy docs
        run: make deploy
