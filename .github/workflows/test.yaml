name: Unit test

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/**"
      - "home/**"
      - "install/**"
      - "tests/**"
  pull_request:
    branches: [master]
    paths:
      - ".github/workflows/**"
      - "home/**"
      - "install/**"
      - "tests/**"

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14]
        system: [client, server]
        exclude:
          - os: macos-14
            system: server

    runs-on: ${{ matrix.os }}
    env:
      OS: ${{ matrix.os }}
      SYSTEM: ${{ matrix.system }}
      CODECOV_FLAGS: ${{ matrix.os }}-${{ matrix.system }}
      CODECOV_NAME: codecov-dotfiles-${{ matrix.os }}-${{ matrix.system }}
      DOTFILES_DEBUG: 1
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install tools
        run: |
          if [ "${OS}" == "macos-14" ]; then
            brew install bats-core kcov parallel

          elif [ "${OS}" == "ubuntu-latest" ]; then
            sudo apt-get update && sudo apt-get install -y bats parallel
            bash ./install/ubuntu/common/kcov.sh

          else
            echo "${OS} and ${SYSTEM} are not supported" >&2
            exit 1
          fi

      - name: Run `shfmt`
        uses: reviewdog/action-shfmt@v1
        with:
          shfmt_flags: -i 4 -sr -d

      - name: Run unit test
        run: |
          ./scripts/run_unit_test.sh

      - name: Setup for codecov
        if: ${{ github.actor != 'dependabot[bot]' && matrix.os == 'ubuntu-latest' }}
        run: |
          if [ "${OS}" == "ubuntu-latest" ]; then
            sudo apt-get install -y gpg jq curl

          else
            echo "${OS} and ${SYSTEM} are not supported" >&2
            exit 1
          fi

      - name: Debug coverage artifacts
        if: ${{ github.actor != 'dependabot[bot]' }}
        run: |
          echo "flags=${CODECOV_FLAGS}"
          echo "codecov_name=${CODECOV_NAME}"
          ls -la ./coverage || true
          find ./coverage -maxdepth 3 -type f | sort || true

      - name: Verify cobertura report exists
        if: ${{ github.actor != 'dependabot[bot]' }}
        run: |
          report_path="./coverage/kcov-merged/cobertura.xml"
          if [ ! -f "${report_path}" ]; then
            echo "Coverage report not found: ${report_path}" >&2
            exit 1
          fi
          wc -c "${report_path}"

      - name: Upload coverage report artifact
        if: ${{ github.actor != 'dependabot[bot]' }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ env.CODECOV_FLAGS }}
          path: ./coverage/kcov-merged/cobertura.xml
          if-no-files-found: error
          retention-days: 7

      - name: Upload coverage to Codecov
        if: ${{ github.actor != 'dependabot[bot]' && matrix.os == 'ubuntu-latest' }}
        uses: codecov/codecov-action@v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          # directory: ./coverage/kcov-merged
          files: ./coverage/kcov-merged/cobertura.xml
          disable_search: true
          env_vars: OS,SYSTEM
          fail_ci_if_error: true
          flags: ${{ env.CODECOV_FLAGS }}
          name: ${{ env.CODECOV_NAME }}
          verbose: true
        # run: |
        #   bash <(curl -s https://codecov.io/bash) \
        #     -n "codecov-dotfiles"             `# Custom defined name of the upload. Visible in Codecov UI.` \
        #     -s ./coverage/kcov-merged         `# Directory to search for coverage reports.` \
        #     -t ${{ secrets.CODECOV_TOKEN }}   `# Set the private repository token.` \
        #     -e OS,SYSTEM                      `# Specify environment variables to be included with this build.` \
        #     -C ${{ github.sha }}              `# Specify the commit sha.` \
        #     -F ${{ env.flags }}               `# Flag the upload to group coverage metrics.` \
        #     -Z                                `# Exit with 1 if not successful. Default will Exit with 0.` \
        #     -v                                `# Verbose mode.`
