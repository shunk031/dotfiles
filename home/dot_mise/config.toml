[tools]
# Keep each group sorted by package name, ignoring backend prefixes and leading `@`.

# Language runtimes
go = "latest"
node = "lts"
python = "3.11"
rust = "latest"

# CLI tools
age = "latest"
aws-cli = "latest"
bats = "latest"
bun = "latest"
chezmoi = "latest"
dotenvx = "latest"
dust = "latest"
eza = "latest"
fd = "latest"
gcloud = "latest"
herdr = "latest"
hugo-extended = "0.136.5"
jq = "latest"
kubectx = "latest"
rg = "latest"
shellcheck = "latest"
shfmt = "latest"
sqlite = "latest"
uv = "latest"
yazi = "latest"
yq = "latest"

# Aqua tools
"aqua:google-antigravity/antigravity-cli" = "latest"

# Cargo tools
"cargo:pueue" = "latest"

# GitHub release tools
"github:cli/cli" = "latest"
"github:d-kuro/gwq" = "latest"
"github:shuntaka9576/blocc" = { version = "latest", os = ["linux"] }
"github:x-motemen/ghq" = "latest"

# npm tools
"npm:agmsg" = "latest"
"npm:@anthropic-ai/claude-code" = "latest"
"npm:bash-language-server" = "latest"
"npm:fast-cli" = "latest"
"npm:@openai/codex" = "latest"
"npm:pyright" = "latest"

[settings]
idiomatic_version_file_enable_tools = ["python"]
